# ==============================================================================
# PIDENet 抓取标注复现 — 全局配置文件
# ==============================================================================
# 所有路径请改成你本机的实际路径（Windows 用正斜杠或双反斜杠均可被 Python 正确解析）

# ---------------------- 数据集路径 ----------------------
dataset_root: "D:/my_files/Linemod_preprocessed/Linemod_preprocessed"
object_id: 1                      # 当前处理的物体编号 (1~15)，对应 data/01, obj_01.ply

# ---------------------- 输出路径 ----------------------
output_dir: "./output"

# ---------------------- 夹爪物理参数 ----------------------
# 用户确认：标准并联夹爪，开口范围 0~100mm
gripper:
  w_min: 0.0          # 米，夹爪最小开口（完全闭合）
  w_max: 0.30          # 米，夹爪最大开口（标准并联夹爪 100mm）
  friction_coeff: 0.5  # 摩擦系数 mu，论文 3.2.5 节用于摩擦锥半角约束，未给出具体值，
                       # 0.5 对应约 26.6° 摩擦锥半角，是橡胶/塑料-金属常见的工程经验值
  finger_thickness: 0.008   # 米，手指厚度，用于碰撞代理体积构建（论文未给出具体尺寸，
                             # 取常见并联夹爪（如 Robotiq 2F-85 / Franka Hand）手指截面经验值）
  finger_length: 0.045      # 米，手指有效接触长度（同上，经验值，Franka Hand 量级）
  approach_clearance: 0.06  # 米，approach volume 在接近方向上的安全延伸长度

# ---------------------- 稳定姿态分析 (3.2.1) ----------------------
stable_pose:
  top_k: 4                  # 论文式(1)：K* = {k1,k2,k3,k4}，固定取前4

# ---------------------- 射线投影 (3.2.2) ----------------------
projection:
  resolution: 400            # 投影二值mask的像素分辨率（正方形网格边长）
  thin_wall_height_ratio: 0.30   # 论文：保留物体高度上方30%的射线击中点，用于薄壁容器环形化
  cavity_pixel_ratio_threshold: 0.02
  # ↑ 自定义阈值：当"环形化"前后mask内部空洞像素占比变化 < 2% 时，
  #   判定该物体不是薄壁中空容器，跳过环形处理（论文没有给出判定该分支是否触发的量化标准，
  #   这是必要的工程补充，否则代码无法自动判断"何时该用30%阈值"）

# ---------------------- EFD 轮廓拟合 (3.2.3) ----------------------
efd:
  harmonic_order: 10          # 论文图4展示了 Harmonic Order=5~13 的拟合效果，10阶是清晰度与
                               # 平滑度的折中（过高阶会重新引入像素锯齿噪声，过低阶丢失局部凹陷特征）
  contour_resample_points: 400 # 重采样轮廓点数，用于EFD系数计算
  min_contour_area_px: 30     # 过滤掉面积过小的连通域噪声（内孔检测时）

# ---------------------- 打分公式参数 (3.2.5) ----------------------
# 论文公式 (4)-(8) 中出现但未给出具体数值的归一化常数，逐一列出依据：
scoring:
  d0_geo: null                 # Eq.(4) d0：几何归一化常数。null 表示运行时自动设为
                                # "物体特征尺寸 D 的 10%"（即 d0 = 0.1*D），这是凹陷深度
                                # 打分的常见自适应做法，避免对不同尺寸物体使用同一固定阈值
  gamma_width: 0.6              # Eq.(6) w* = gamma * w_max，目标最优夹爪宽度系数。
                                # 取0.6（即开口约60%处最优）是抓取规划文献中常见的经验设定
                                # （留有足够闭合余量，同时不会太接近最大张开的不稳定区）
  sigma_w: null                 # Eq.(6) 宽度容忍带宽。null → 自动设为 0.15*(w_max-w_min)
  sigma_c: null                 # Eq.(7) 力矩臂容忍带宽。null → 自动设为 0.25*D（D为物体特征尺寸）
  lambda_weights: [0.30, 0.30, 0.20, 0.20]
  # Eq.(8) 四项权重 [geo, ali, wid, com]，论文未给出具体数值，仅说明 sum=1, lambda_i>=0。
  # 几何凹陷与对极对齐是抓取稳定性核心要素，赋予更高权重(0.30)；宽度合规与力矩臂为次要约束(0.20)

# ---------------------- 碰撞代理打分 (3.2.6, 见README的D6说明) ----------------------
collision:
  alpha: 3.0                   # Eq.(10) 软碰撞惩罚的衰减系数，论文未给出具体值。alpha=3.0
                                # 使得当危险点密度达到约33%体积占比时惩罚降至 exp(-1)=0.368，
                                # 是一个合理的中等灵敏度取值
  depth_occlusion_margin: 0.005  # 米，判定碰撞体内某点"被遮挡/有障碍物"的深度容差

# ---------------------- 帧采样 ----------------------
frames:
  process_all: true            # true: 处理 data/01 下所有帧；false: 只处理 max_frames 张（调试用）
  max_frames: 50                # process_all=false 时生效
